name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Initialize Android project
        run: flutter create --project-name camscan --platforms android .

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: Configure Android SDK Versions
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/compileSdk .*/compileSdk 34/' android/app/build.gradle
          sed -i 's/targetSdk .*/targetSdk 34/' android/app/build.gradle

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Add Camera Permission
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CAMSCAN-Release
          path: build/app/outputs/flutter-apk/app-release.apk
